name: Pipeline CI/CD com Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Instala dependências e roda os testes automatizados
  CI:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Executar Testes
      run: |
        pytest -v > test-report.txt
    - name: Publicar Relatório de Testes
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: relatorio-testes
        path: test-report.txt

  # Job 2: Valida se o Dockerfile está construindo corretamente (Sem dar Push)
  Build:
    needs: CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build da Imagem Docker
      run: docker build -t minha-api-teste:latest .

  # Job 3: Publica a imagem final no Docker Hub se estiver na branch main
  CD:
    needs: Build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build e Push da Imagem
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/api-devops:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/api-devops:${{ github.sha }}
